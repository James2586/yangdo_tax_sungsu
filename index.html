    const tpS = Math.round(tp * shareRatio), apS = Math.round(ap * shareRatio), expS = Math.round(exp * shareRatio);

                const taxableGain = Math.round(totalGain * taxableRatio); // 과세 차익

                        if (hc <= 1 && holdOk && resOk && isResident) {
